x-otel-environment: &otel-environment
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
  OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-local}

include:
  - path: observability/docker-compose.signoz.yaml

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}
      interval: 5s
      timeout: 5s
      retries: 10
  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-app}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-app}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma-data:/data
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    restart: unless-stopped
    env_file:
      - ./.litellm/.env
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./.litellm/config.yaml:/app/config.yaml:ro
  identity:
    build:
      context: .
      dockerfile: identity/Dockerfile
    restart: unless-stopped
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: identity
      IDENTITY_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      IDENTITY_DATABASE_SCHEMA: ${IDENTITY_DATABASE_SCHEMA:-identity}
    ports:
      - "${IDENTITY_PORT:-8100}:8100"
    depends_on:
      postgres:
        condition: service_healthy
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.litellm/.env
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: backend
      BACKEND_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      BACKEND_DATABASE_SCHEMA: ${BACKEND_DATABASE_SCHEMA:-backend}
      BACKEND_JWT_SECRET: ${BACKEND_JWT_SECRET:?BACKEND_JWT_SECRET is required}
      BACKEND_JWT_ALGORITHM: ${BACKEND_JWT_ALGORITHM:-HS256}
      BACKEND_RABBITMQ_URL: amqp://${RABBITMQ_USER:-app}:${RABBITMQ_PASSWORD:-app}@rabbitmq:5672/${RABBITMQ_VHOST:-app}
      BACKEND_REQUEST_QUEUE: ${BACKEND_REQUEST_QUEUE:-agent.requests}
      BACKEND_REPLY_QUEUE: ${BACKEND_REPLY_QUEUE:-agent.replies}
      BACKEND_STREAM_TIMEOUT_SECONDS: ${BACKEND_STREAM_TIMEOUT_SECONDS:-120}
      BACKEND_RECENT_MESSAGES_LIMIT: ${BACKEND_RECENT_MESSAGES_LIMIT:-20}
      BACKEND_FRONTEND_ORIGIN: ${BACKEND_FRONTEND_ORIGIN:-http://localhost:5173}
      BACKEND_DEMO_PASSWORD: ${BACKEND_DEMO_PASSWORD:?BACKEND_DEMO_PASSWORD is required}
      BACKEND_LITELLM_URL: ${BACKEND_LITELLM_URL:-http://litellm:4000}
      BACKEND_LITELLM_MODEL: ${BACKEND_LITELLM_MODEL:-openai/gpt-4o-mini}
      BACKEND_EMBEDDING_MODEL: ${BACKEND_EMBEDDING_MODEL:-kb-embedding}
      BACKEND_CHROMA_URL: ${BACKEND_CHROMA_URL:-http://chroma:8000}
      BACKEND_CHROMA_COLLECTION: ${BACKEND_CHROMA_COLLECTION:-banking_knowledge_base_v1}
      BACKEND_KB_MAX_FILE_SIZE_BYTES: ${BACKEND_KB_MAX_FILE_SIZE_BYTES:-10485760}
      BACKEND_BANKING_API_URL: ${BACKEND_BANKING_API_URL:-http://banking-api:8300}
    ports:
      - "${BACKEND_PORT:-8200}:8200"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chroma:
        condition: service_started
      litellm:
        condition: service_started
  banking-api:
    build:
      context: ./banking_api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BANKING_API_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      BANKING_API_DATABASE_SCHEMA: ${BANKING_API_DATABASE_SCHEMA:-banking_api}
    ports:
      - "${BANKING_API_PORT:-8300}:8300"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - --no-sync
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/health')"
      interval: 5s
      timeout: 5s
      retries: 10
  mcp-proxy:
    build:
      context: .
      dockerfile: mcp_proxy/Dockerfile
    restart: unless-stopped
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: mcp-proxy
      MCP_BANKING_API_BASE_URL: http://banking-api:8300
      MCP_REQUEST_TIMEOUT_SECONDS: ${MCP_REQUEST_TIMEOUT_SECONDS:-10}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8400
    ports:
      - "${MCP_PORT:-8400}:8400"
    depends_on:
      banking-api:
        condition: service_healthy
  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.litellm/.env
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: agents
      AGENTS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-app}:${RABBITMQ_PASSWORD:-app}@rabbitmq:5672/${RABBITMQ_VHOST:-app}
      AGENTS_REQUEST_QUEUE: ${AGENTS_REQUEST_QUEUE:-agent.requests}
      AGENTS_REPLY_QUEUE: ${AGENTS_REPLY_QUEUE:-agent.replies}
      AGENTS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      AGENTS_DATABASE_SCHEMA: ${AGENTS_DATABASE_SCHEMA:-agents}
      AGENTS_IDENTITY_BASE_URL: http://identity:8100
      AGENTS_IDENTITY_TIMEOUT_SECONDS: ${AGENTS_IDENTITY_TIMEOUT_SECONDS:-10}
      AGENTS_MCP_URL: http://mcp-proxy:8400/mcp
      AGENTS_MCP_TIMEOUT_SECONDS: ${AGENTS_MCP_TIMEOUT_SECONDS:-20}
      AGENTS_LITELLM_URL: ${AGENTS_LITELLM_URL:-http://litellm:4000}
      AGENTS_LITELLM_MODEL: ${AGENTS_LITELLM_MODEL:-chat-default}
      AGENTS_EMBEDDING_MODEL: ${AGENTS_EMBEDDING_MODEL:-kb-embedding}
      AGENTS_EMBEDDING_DIMENSIONS: ${AGENTS_EMBEDDING_DIMENSIONS:-768}
      AGENTS_CHROMA_URL: ${AGENTS_CHROMA_URL:-http://chroma:8000}
      AGENTS_CHROMA_COLLECTION: ${AGENTS_CHROMA_COLLECTION:-banking_knowledge_base_v1}
      AGENTS_CHROMA_TENANT: ${AGENTS_CHROMA_TENANT:-default_tenant}
      AGENTS_CHROMA_DATABASE: ${AGENTS_CHROMA_DATABASE:-default_database}
      AGENTS_RETRIEVAL_RESULTS_LIMIT: ${AGENTS_RETRIEVAL_RESULTS_LIMIT:-3}
      AGENTS_RESPONSE_CHUNK_SIZE: ${AGENTS_RESPONSE_CHUNK_SIZE:-140}
    depends_on:
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
      chroma:
        condition: service_started
      litellm:
        condition: service_started
      mcp-proxy:
        condition: service_started
  app-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
volumes:
  postgres-data:
  rabbitmq-data:
  chroma-data:
