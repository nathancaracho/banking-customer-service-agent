x-clickhouse-defaults: &clickhouse-defaults
  restart: on-failure
  image: clickhouse/clickhouse-server:24.1.2-alpine
  tty: true
  depends_on:
    - zookeeper-1
  logging:
    options:
      max-size: 50m
      max-file: "3"
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144

x-db-depend: &db-depend
  depends_on:
    clickhouse:
      condition: service_healthy
    otel-collector-migrator:
      condition: service_completed_successfully

services:
  zookeeper-1:
    image: zookeeper:3.7
    container_name: signoz-zookeeper
    hostname: zookeeper-1
    environment:
      ZOO_MY_ID: "1"
      ZOO_4LW_COMMANDS_WHITELIST: "*"
    volumes:
      - signoz-zookeeper-data:/data

  clickhouse:
    <<: *clickhouse-defaults
    container_name: signoz-clickhouse
    hostname: clickhouse
    volumes:
      - ./clickhouse-setup/clickhouse-config.xml:/etc/clickhouse-server/config.xml
      - ./clickhouse-setup/clickhouse-users.xml:/etc/clickhouse-server/users.xml
      - ./clickhouse-setup/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./clickhouse-setup/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - signoz-clickhouse-data:/var/lib/clickhouse/
      - ./clickhouse-setup/user_scripts:/var/lib/clickhouse/user_scripts/

  otel-collector-migrator:
    image: signoz/signoz-schema-migrator:0.102.2
    container_name: signoz-schema-migrator
    command: ["--dsn=tcp://clickhouse:9000"]
    depends_on:
      clickhouse:
        condition: service_healthy

  query-service:
    image: signoz/query-service:0.49.1
    container_name: signoz-query-service
    command: ["-config=/root/config/prometheus.yml"]
    volumes:
      - ./clickhouse-setup/prometheus.yml:/root/config/prometheus.yml
      - ./dashboards:/root/config/dashboards
      - signoz-query-data:/var/lib/signoz/
    environment:
      - ClickHouseUrl=tcp://clickhouse:9000
      - ALERTMANAGER_API_PREFIX=http://alertmanager:9093/api/
      - SIGNOZ_LOCAL_DB_PATH=/var/lib/signoz/signoz.db
      - DASHBOARDS_PATH=/root/config/dashboards
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=true
      - DEPLOYMENT_TYPE=docker-standalone-amd
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    <<: *db-depend

  alertmanager:
    image: signoz/alertmanager:0.23.5
    container_name: signoz-alertmanager
    volumes:
      - signoz-alertmanager-data:/data
    depends_on:
      query-service:
        condition: service_healthy
    restart: on-failure
    command:
      - --queryService.url=http://query-service:8085
      - --storage.path=/data

  frontend:
    image: signoz/frontend:0.49.1
    container_name: signoz-frontend
    restart: on-failure
    depends_on:
      - alertmanager
      - query-service
    ports:
      - "${SIGNOZ_UI_PORT:-3301}:3301"
    volumes:
      - ./common/nginx-config.conf:/etc/nginx/conf.d/default.conf

  otel-collector:
    container_name: signoz-otel-collector
    image: signoz/signoz-otel-collector:0.102.2
    command:
      [
        "--config=/etc/otel-collector-config.yaml",
        "--manager-config=/etc/manager-config.yaml",
        "--copy-path=/var/tmp/collector-config.yaml",
        "--feature-gates=-pkg.translator.prometheus.NormalizeName",
      ]
    volumes:
      - ./clickhouse-setup/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./clickhouse-setup/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
    ports:
      - "${SIGNOZ_OTLP_GRPC_PORT:-4317}:4317"
      - "${SIGNOZ_OTLP_HTTP_PORT:-4318}:4318"
    restart: on-failure
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector-migrator:
        condition: service_completed_successfully
      query-service:
        condition: service_healthy

volumes:
  signoz-zookeeper-data:
  signoz-clickhouse-data:
  signoz-query-data:
  signoz-alertmanager-data:
